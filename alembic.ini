[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

# sqlalchemy.url is intentionally left blank here — migrations/env.py
# reads it from Config.DATABASE_URL (i.e. your .env) at runtime instead,
# so there's only one place the DB URL is configured.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
